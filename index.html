<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pitch Partner</title>
  <link rel="stylesheet" href="styles.css?v=4" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
</head>
<body>
  <header class="nav">
    <a href="#" class="brand" aria-label="Pitch Partner inicio">
      <span class="brand-logo" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g stroke="currentColor" stroke-width="4.2" stroke-linejoin="round" stroke-linecap="round" fill="none">
            <rect x="15" y="14" width="36" height="26" rx="6"/>
            <path d="M11 26 h30 a6 6 0 0 1 6 6 v12 a6 6 0 0 1 -6 6 h-17 l-8 6 2 -6 h-1 a6 6 0 0 1 -6 -6 z"/>
          </g>
        </svg>
      </span>
    </a>
  </header>

  <main class="main">
    <section class="auth-card" aria-labelledby="auth-title">
      <div class="auth-header">
        <span class="brand-logo brand-logo-lg" aria-hidden="true">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g stroke="currentColor" stroke-width="4.2" stroke-linejoin="round" stroke-linecap="round" fill="none">
              <rect x="15" y="14" width="36" height="26" rx="6"/>
              <path d="M11 26 h30 a6 6 0 0 1 6 6 v12 a6 6 0 0 1 -6 6 h-17 l-8 6 2 -6 h-1 a6 6 0 0 1 -6 -6 z"/>
            </g>
          </svg>
        </span>
        <div class="auth-header-text">
          <h1 id="auth-title" class="auth-title" data-title>Bienvenido de nuevo</h1>
          <p class="auth-subtitle" data-subtitle>Inicia sesión para continuar</p>
        </div>
      </div>

      <div class="tabs" role="tablist" aria-label="Elige una opción">
        <button type="button" class="tab" role="tab" data-tab="signup" aria-selected="false">Inscribirse</button>
        <button type="button" class="tab is-active" role="tab" data-tab="login" aria-selected="true">Iniciar sesión</button>
      </div>

      <form class="form" data-form="login" autocomplete="on" novalidate>
        <div class="field">
          <label for="login-email">Correo electrónico</label>
          <div class="input">
            <span class="input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="5" width="18" height="14" rx="2.5" stroke="currentColor" stroke-width="1.6"/><path d="m4 7 8 6 8-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
            <input id="login-email" name="email" type="email" placeholder="tú@ejemplo.com" required autocomplete="email" inputmode="email" />
            <span class="input-icon input-icon-trailing" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 8V6a2 2 0 0 1 2-2h2M20 8V6a2 2 0 0 0-2-2h-2M4 16v2a2 2 0 0 0 2 2h2M20 16v2a2 2 0 0 1-2 2h-2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.6"/></svg>
            </span>
          </div>
        </div>

        <div class="field">
          <label for="login-password">Contraseña</label>
          <div class="input">
            <span class="input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="10" width="16" height="10" rx="2.5" stroke="currentColor" stroke-width="1.6"/><path d="M8 10V7a4 4 0 1 1 8 0v3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            </span>
            <input id="login-password" name="password" type="password" placeholder="••••••••" required autocomplete="current-password" minlength="6" />
            <button type="button" class="input-icon input-icon-trailing toggle-pass" aria-label="Mostrar contraseña" data-toggle-pass="login-password">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2.5 12s3.5-7 9.5-7 9.5 7 9.5 7-3.5 7-9.5 7-9.5-7-9.5-7Z" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Iniciar sesión</button>

        <div class="divider"><span>o</span></div>

        <button type="button" class="btn btn-google btn-block" data-google="login">
          <span class="google-icon" aria-hidden="true">
            <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
          </span>
          Continuar con Google
        </button>

        <p class="form-footer">¿No tienes una cuenta? <a href="#" class="link" data-switch-to="signup">Inscribirse</a></p>
      </form>

      <form class="form" data-form="signup" autocomplete="on" novalidate hidden>
        <div class="field">
          <label for="signup-name">Nombre completo</label>
          <div class="input">
            <span class="input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.6"/><path d="M4 20c1.5-3.5 4.5-5 8-5s6.5 1.5 8 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            </span>
            <input id="signup-name" name="name" type="text" placeholder="Tu nombre" required autocomplete="name" />
          </div>
        </div>

        <div class="field">
          <label for="signup-email">Correo electrónico</label>
          <div class="input">
            <span class="input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="5" width="18" height="14" rx="2.5" stroke="currentColor" stroke-width="1.6"/><path d="m4 7 8 6 8-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
            <input id="signup-email" name="email" type="email" placeholder="tú@ejemplo.com" required autocomplete="email" inputmode="email" />
          </div>
        </div>

        <div class="field">
          <label for="signup-password">Contraseña</label>
          <div class="input">
            <span class="input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="10" width="16" height="10" rx="2.5" stroke="currentColor" stroke-width="1.6"/><path d="M8 10V7a4 4 0 1 1 8 0v3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            </span>
            <input id="signup-password" name="password" type="password" placeholder="Mínimo 8 caracteres" required autocomplete="new-password" minlength="8" />
            <button type="button" class="input-icon input-icon-trailing toggle-pass" aria-label="Mostrar contraseña" data-toggle-pass="signup-password">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2.5 12s3.5-7 9.5-7 9.5 7 9.5 7-3.5 7-9.5 7-9.5-7-9.5-7Z" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Crear cuenta</button>

        <div class="divider"><span>o</span></div>

        <button type="button" class="btn btn-google btn-block" data-google="signup">
          <span class="google-icon" aria-hidden="true">
            <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
          </span>
          Registrarse con Google
        </button>

        <p class="form-footer">¿Ya tienes una cuenta? <a href="#" class="link" data-switch-to="login">Iniciar sesión</a></p>
      </form>

      <div class="toast" data-toast role="status" aria-live="polite" hidden></div>
    </section>
  </main>

  <script src="app.js?v=4"></script>
</body>
</html>
